<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3a1e6a"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
    <linearGradient id="orbital" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Circuit pattern -->
  <g stroke="#3a1e6a" stroke-width="0.5" fill="none" opacity="0.6">
    <path d="M 20 50 L 80 50 L 80 90"/>
    <path d="M 380 50 L 320 50 L 320 90"/>
    <path d="M 20 350 L 80 350 L 80 310"/>
    <path d="M 380 350 L 320 350 L 320 310"/>
    <path d="M 50 20 L 50 80 L 90 80"/>
    <path d="M 350 20 L 350 80 L 310 80"/>
    <path d="M 50 380 L 50 320 L 90 320"/>
    <path d="M 350 380 L 350 320 L 310 320"/>
  </g>
  <g fill="#00d4ff" opacity="0.8">
    <circle cx="80" cy="90" r="2"/>
    <circle cx="320" cy="90" r="2"/>
    <circle cx="80" cy="310" r="2"/>
    <circle cx="320" cy="310" r="2"/>
    <circle cx="90" cy="80" r="2"/>
    <circle cx="310" cy="80" r="2"/>
    <circle cx="90" cy="320" r="2"/>
    <circle cx="310" cy="320" r="2"/>
  </g>

  <!-- Orbital ring -->
  <ellipse cx="200" cy="160" rx="80" ry="30" fill="none" stroke="url(#orbital)" stroke-width="2" transform="rotate(-15 200 160)" opacity="0.7"/>

  <!-- S sphere (stylized) -->
  <g filter="url(#glow)">
    <circle cx="200" cy="160" r="50" fill="#0a0a2e" stroke="#00d4ff" stroke-width="2"/>
    <text x="200" y="180" text-anchor="middle" font-family="'DejaVu Sans', sans-serif" font-size="64" font-weight="bold" fill="#00d4ff">S</text>
  </g>

  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" font-family="'DejaVu Sans', sans-serif" font-size="38" font-weight="bold" fill="#c0c0c0" letter-spacing="4">SOTA OS</text>

  <!-- Claim -->
  <text x="200" y="295" text-anchor="middle" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#ffffff" letter-spacing="3" opacity="0.9">INTELLIGENT. SECURE. AUTONOMOUS.</text>

  <!-- Underline accent -->
  <line x1="120" y1="320" x2="280" y2="320" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
</svg>